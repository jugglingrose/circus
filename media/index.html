                style="width: 100%"
              />
            </div>
          </div>
          <div class="col-md-4">

          <div class="thumbnail portrait">
            <img

            />
          </div>

          <div class="col-md-4">

              <img

                  currentSlide(4);

                style="width: 100%"
              />

          </div>

        <div class="row">
          <div class="col-md-4">

                  currentSlide(8);
                "
                alt="A hula hooper balancing a hoop on her face while kids watch"
                style="width: 100%"
              />
            </div>
          </div>
          <div class="col-md-4">
            <div class="thumbnail landscape">
              <img

                  currentSlide(9);

                style="width: 100%"

            <div class="col-xs-12 mySlides carousel-landscape">
              <img
                src="../assets/images/2-hoop-weave-circus.jpg"
                style="width: 100%"
              />
            </div>
          </div>
          <div class="row">
            <div class="col-xs-12 mySlides carousel-landscape">

                src="../assets/images/circus-style-ball-juggling.jpg"

          </div>

          </div>
          <div class="row">

              <img

            </div>
